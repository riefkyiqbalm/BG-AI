# .github/workflows/deploy-s3.yml

name: Deploy Static Site to S3

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # IMPORTANT: Replace with your actual AWS region
          aws-region: ap-southeast-1

      # --- START OF THE CHANGE ---
      - name: Deploy to S3 with s3-sync
        # Use the correct action and its latest recommended version
        uses: aws-actions/s3-sync@v1.1.1 # As of July 2025, v1.1.1 is the latest stable. Check the marketplace for newer versions!
        with:
          # IMPORTANT: Replace 'your-s3-bucket-name' with the exact name of your S3 bucket.
          bucket: balteng.com
          # Source directory: '.' if files are at repo root, or 'dist'/'build' if a build step exists.
          source-dir: .
          # S3 ACL for uploaded objects. 'public-read' is common for static websites.
          acl: public-read
          # These options control the sync behavior.
          # 'delete-removed' will remove files from S3 if they are no longer in your source-dir.
          delete-removed: true
          # 'cache-control' can be used to set caching headers.
          # 'no-cache' ensures browsers always request fresh files (good for development).
          # For production, you might set a max-age: 'max-age=31536000, public, immutable'
          cache-control: no-cache
      # --- END OF THE CHANGE ---